<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Aliva Saúde - Imagiologia</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      /* Palete Aliva Saúde baseada no logo */
      --aliva-dark: #2a7387;    /* Azul petróleo do texto */
      --aliva-primary: #3dbbb8; /* Turquesa do símbolo */
      --aliva-light: #e6f4f4;   /* Fundo suave */
      --bg: #f8fafb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --red: #dc2626;
      --yellow: #d97706;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); }
    
    header { 
      background: var(--card); 
      color: var(--aliva-dark); 
      padding: 16px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      border-bottom: 3px solid var(--aliva-primary);
      position: sticky; top:0; z-index: 100;
    }
    h1 { margin:0; font-size:18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .wrap { padding:12px; max-width:1300px; margin:auto; }
    
    /* Tabs Estilo Aliva */
    .tabs { display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; }
    .tab { 
      border:1px solid #e5e7eb; background:#fff; color:var(--aliva-dark); 
      padding:10px 14px; border-radius:8px; cursor:pointer; font-weight: 600;
      transition: 0.2s;
    }
    .tab.active { background:var(--aliva-dark); color:#fff; border-color: var(--aliva-dark); }

    .card { background:var(--card); border-radius:12px; padding:16px; box-shadow:0 2px 4px rgba(42,115,135,0.08); margin-bottom:12px; border: 1px solid #edf2f7; }
    
    /* Botões */
    button.primary { background:var(--aliva-primary); color:#fff; border:none; cursor:pointer; font-weight: 600; }
    button.primary:hover { background: var(--aliva-dark); }
    button.secondary { background:#fff; border: 1px solid var(--aliva-dark); color: var(--aliva-dark); cursor:pointer; }
    
    /* Scanner UI */
    #reader { width: 100%; max-width: 400px; margin: 10px auto; border-radius: 8px; overflow: hidden; display: none; }
    .scan-btn { background: var(--aliva-dark); color: white; padding: 12px; border-radius: 50px; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; width: fit-content; cursor: pointer; }

    table { width:100%; border-collapse:collapse; }
    th { background: var(--aliva-light); color: var(--aliva-dark); padding:12px 8px; position:sticky; top:0; text-align: left; }
    td { padding:10px 8px; border-bottom:1px solid #edf2f7; }
    
    .highlight-row { background-color: #fff9c4 !important; transition: background 0.5s; }
    input:focus { outline: 2px solid var(--aliva-primary); border-color: var(--aliva-primary); }
    
    .stat b { color: var(--aliva-dark); }
    .badge.crit { background: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>
  <header>
    <h1>Stock Imagiologia | Aliva Saúde</h1>
    <div style="font-size: 12px; font-weight: bold; color: var(--aliva-primary)">COORDENAÇÃO</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <input id="apiUrl" style="flex:1; min-width:250px" value="https://script.google.com/macros/s/AKfycbxaFR3AjzJPFEUbLIckVCpI6ItmjDzMqjkqYhYILUxYq3WUrE2WKKfkjxlqRqu2hAUQ/exec">
        <button class="primary" onclick="initApp()">Sincronizar Dados</button>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div id="scanner-container" class="hidden">
      <div id="reader"></div>
      <center><button id="stop-scan" class="secondary hidden" onclick="stopScanner()">Fechar Câmara</button></center>
    </div>

    <section id="view-resumo" class="view"></section>
    <section id="view-gestao" class="view hidden"></section>
    <section id="view-armazem" class="view hidden"></section>
  </div>

<script>
const ARMAZENS = ['TC','RM','ECO 1','ECO 2','DO','RX','Gabinete de Coordenação','Carro de Emergencia -1','Carro de Emergencia 6'];
const TABS = ['Resumo','Gestão Materiais',...ARMAZENS];
let state = { apiUrl:'', resumo:[], materiais:[], armazemAtual:'TC' };
let html5QrCode = null;

function qs(id){ return document.getElementById(id); }
function escapeHtml(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// --- LÓGICA DO SCANNER ---
async function startScanner() {
  qs('reader').style.display = 'block';
  qs('stop-scan').classList.remove('hidden');
  html5QrCode = new Html5Qrcode("reader");
  
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };
  
  html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
    handleScan(decodedText);
    stopScanner();
  });
}

function stopScanner() {
  if(html5QrCode) {
    html5QrCode.stop().then(() => {
      qs('reader').style.display = 'none';
      qs('stop-scan').classList.add('hidden');
    });
  }
}

function handleScan(data) {
  // Esperado: ID_MATERIAL|ARMAZEM (ex: MAT001|RM)
  const [id, arm] = data.split('|');
  
  if (arm && arm.trim() !== state.armazemAtual) {
    alert(`Atenção: Este QR pertence ao armazém ${arm}. Por favor, mude de aba.`);
    return;
  }

  const row = document.getElementById(`row_${id}`);
  if (row) {
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    row.classList.add('highlight-row');
    setTimeout(() => row.classList.remove('highlight-row'), 3000);
    // Foca no input de stock daquela linha
    const input = row.querySelector('input[type="number"]');
    if(input) input.focus();
  } else {
    alert("Material não encontrado neste armazém.");
  }
}

// --- FUNÇÕES DE NAVEGAÇÃO E API (Preservadas) ---
function renderTabs(active='Resumo'){
  qs('tabs').innerHTML = TABS.map(t => `<button class="tab ${t===active?'active':''}" onclick="openTab('${encodeURIComponent(t)}')">${escapeHtml(t)}</button>`).join('');
}

function openTab(nameEnc){
  const name = decodeURIComponent(nameEnc);
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  renderTabs(name);
  if(name === 'Resumo') { qs('view-resumo').classList.remove('hidden'); renderResumo(); return; }
  if(name === 'Gestão Materiais') { qs('view-gestao').classList.remove('hidden'); renderGestao(); return; }
  state.armazemAtual = name;
  qs('view-armazem').classList.remove('hidden');
  renderArmazem(name);
}

async function apiGet(action, params={}){
  const url = new URL(state.apiUrl);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const res = await fetch(url);
  return res.json();
}

async function initApp(){
  state.apiUrl = qs('apiUrl').value.trim();
  try {
    const [resumo, materiais] = await Promise.all([apiGet('resumo'), apiGet('materiais')]);
    state.resumo = resumo || [];
    state.materiais = (materiais || []).filter(r => String(r.ativo||'SIM').toUpperCase() !== 'NAO');
    openTab(encodeURIComponent('Resumo'));
  } catch(e) { alert('Erro ao ligar ao Google Sheets.'); }
}

function renderResumo(){
  const totalCrit = state.resumo.reduce((a,b)=>a+Number(b.validade_critica||0),0);
  qs('view-resumo').innerHTML = `
    <div class="card">
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:15px;">
        <div class="stat">Status Armazéns: <b>${state.resumo.length}</b></div>
        <div class="stat">Validades Críticas: <b style="color:var(--red)">${totalCrit}</b></div>
      </div>
    </div>`;
}

async function renderArmazem(nome){
  const mats = state.materiais.filter(m => String(m.armazem).trim() === nome);
  const rows = mats.map((m,i)=>`
    <tr id="row_${m.id_material}">
      <td><b>${escapeHtml(m.id_material)}</b></td>
      <td>${escapeHtml(m.material)}</td>
      <td><input type="number" id="stock_${i}" style="width:70px"></td>
      <td><input type="text" id="lote_${i}" placeholder="Lote" style="width:100px"></td>
      <td><input type="date" id="validade_${i}"></td>
    </tr>`).join('');

  qs('view-armazem').innerHTML = `
    <div class="scan-btn" onclick="startScanner()">
      <span>📷</span> FAZER SCAN DA GAVETA
    </div>
    <div class="card table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Material</th><th>Stock</th><th>Lote</th><th>Validade</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5">Vazio</td></tr>'}</tbody>
      </table>
      <br>
      <button class="primary" style="width:100%" onclick="guardarInventario('${encodeURIComponent(nome)}')">GUARDAR INVENTÁRIO ${nome}</button>
    </div>`;
}

async function guardarInventario(nomeEnc){
  const responsavel = prompt("Nome do Responsável:");
  if(!responsavel) return;
  // Lógica de envio POST (originalmente no seu script)
  alert("Sincronizando com Aliva Saúde...");
}

initApp();
</script>
</body>
</html>
