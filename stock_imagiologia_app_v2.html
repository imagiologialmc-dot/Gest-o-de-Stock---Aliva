<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Imagiologia</title>
  <style>
    :root {
      --bg:#f4f7fb; --card:#ffffff; --line:#d9e2ec; --text:#1f2937; --muted:#6b7280;
      --blue:#2563eb; --blue2:#dbeafe; --green:#16a34a; --red:#dc2626; --yellow:#d97706;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    header { background:var(--blue); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:5; }
    h1 { margin:0; font-size:20px; }
    .wrap { padding:12px; max-width:1300px; margin:auto; }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
    .tab { border:0; background:#fff; color:var(--text); padding:10px 12px; border-radius:10px; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.08); }
    .tab.active { background:var(--blue); color:#fff; }
    .card { background:var(--card); border-radius:14px; padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .stat { flex:1 1 180px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px; }
    .stat b { display:block; font-size:22px; margin-top:6px; }
    .muted { color:var(--muted); }
    .controls { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
    input, select, button, textarea { padding:10px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; }
    button.primary { background:var(--blue); color:#fff; border-color:var(--blue); cursor:pointer; }
    button.secondary { background:#fff; cursor:pointer; }
    button.danger { background:var(--red); color:#fff; border-color:var(--red); cursor:pointer; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 8px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    th { background:#f8fafc; position:sticky; top:0; }
    .table-wrap { overflow:auto; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:bold; }
    .ok { background:#dcfce7; color:#166534; }
    .baixo { background:#fee2e2; color:#991b1b; }
    .prox { background:#fef3c7; color:#92400e; }
    .crit { background:#fecaca; color:#991b1b; }
    .hidden { display:none; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .topbar { display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
    .small { font-size:12px; }
    @media (max-width: 800px) { .grid2 { grid-template-columns:1fr; } th,td { font-size:13px; } }
  </style>
</head>
<body>
  <header>
    <h1>Gestão de Stock - Imagiologia</h1>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div>
          <div class="muted small">Google Apps Script</div>
          <div id="apiLabel" class="small"></div>
        </div>
        <div class="controls">
          <input id="apiUrl" style="min-width:320px" value="https://script.google.com/macros/s/AKfycbxaFR3AjzJPFEUbLIckVCpI6ItmjDzMqjkqYhYILUxYq3WUrE2WKKfkjxlqRqu2hAUQ/exec">
          <button class="secondary" onclick="saveApiUrl()">Guardar URL</button>
          <button class="primary" onclick="initApp()">Ligar</button>
        </div>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <section id="view-resumo" class="view"></section>
    <section id="view-gestao" class="view hidden"></section>
    <section id="view-armazem" class="view hidden"></section>
  </div>

<script>
const ARMAZENS = ['TC','RM','ECO 1','ECO 2','DO','RX','Gabinete de Coordenação','Carro de Emergencia -1','Carro de Emergencia 6'];
const TABS = ['Resumo','Gestão Materiais',...ARMAZENS];
let state = { apiUrl:'', resumo:[], materiais:[], armazemAtual:'TC' };

function qs(id){ return document.getElementById(id); }
function escapeHtml(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function saveApiUrl(){
  localStorage.setItem('stock_api_url', qs('apiUrl').value.trim());
  updateApiLabel();
}
function loadApiUrl(){
  const saved = localStorage.getItem('stock_api_url');
  if(saved) qs('apiUrl').value = saved;
  state.apiUrl = qs('apiUrl').value.trim();
  updateApiLabel();
}
function updateApiLabel(){
  state.apiUrl = qs('apiUrl').value.trim();
  qs('apiLabel').textContent = state.apiUrl || 'Sem URL';
}

function renderTabs(active='Resumo'){
  qs('tabs').innerHTML = TABS.map(t => `<button class="tab ${t===active?'active':''}" onclick="openTab('${encodeURIComponent(t)}')">${escapeHtml(t)}</button>`).join('');
}
function openTab(nameEnc){
  const name = decodeURIComponent(nameEnc);
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  renderTabs(name);
  if(name === 'Resumo') { qs('view-resumo').classList.remove('hidden'); renderResumo(); return; }
  if(name === 'Gestão Materiais') { qs('view-gestao').classList.remove('hidden'); renderGestao(); return; }
  state.armazemAtual = name;
  qs('view-armazem').classList.remove('hidden');
  renderArmazem(name);
}

async function apiGet(action, params={}){
  const url = new URL(state.apiUrl);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const res = await fetch(url);
  if(!res.ok) throw new Error('Falha no pedido');
  return res.json();
}

async function apiPost(payload){
  const res = await fetch(state.apiUrl, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error('Falha no envio');
  return res.json();
}

async function initApp(){
  saveApiUrl();
  try {
    const [resumo, materiais] = await Promise.all([
      apiGet('resumo'),
      apiGet('materiais')
    ]);
    state.resumo = Array.isArray(resumo) ? resumo : [];
    state.materiais = Array.isArray(materiais) ? materiais.filter(r => String(r.ativo||'SIM').toUpperCase() !== 'NAO') : [];
    renderTabs('Resumo');
    openTab(encodeURIComponent('Resumo'));
  } catch(e) {
    alert('Erro ao ligar à API. Verifica o deploy do Apps Script e permissões.');
  }
}

function renderResumo(){
  const cards = state.resumo.map(r => `
    <div class="stat">
      <div class="muted">${escapeHtml(r.armazem)}</div>
      <b>${Number(r.total_itens||0)}</b>
      <div class="small">Itens registados</div>
      <div class="small">Stock baixo: <b>${Number(r.stock_baixo||0)}</b></div>
      <div class="small">Validade próxima: <b>${Number(r.validade_proxima||0)}</b></div>
      <div class="small">Validade crítica: <b>${Number(r.validade_critica||0)}</b></div>
    </div>`).join('');

  const totalBaixo = state.resumo.reduce((a,b)=>a+Number(b.stock_baixo||0),0);
  const totalProx = state.resumo.reduce((a,b)=>a+Number(b.validade_proxima||0),0);
  const totalCrit = state.resumo.reduce((a,b)=>a+Number(b.validade_critica||0),0);

  qs('view-resumo').innerHTML = `
    <div class="card">
      <div class="row">
        <div class="stat"><div class="muted">Armazéns</div><b>${state.resumo.length}</b></div>
        <div class="stat"><div class="muted">Stock baixo</div><b>${totalBaixo}</b></div>
        <div class="stat"><div class="muted">Validade próxima</div><b>${totalProx}</b></div>
        <div class="stat"><div class="muted">Validade crítica</div><b>${totalCrit}</b></div>
      </div>
    </div>
    <div class="card"><div class="row">${cards || '<div class="muted">Sem dados.</div>'}</div></div>`;
}

function renderGestao(){
  const rows = state.materiais.map((m,i)=>`
    <tr>
      <td>${escapeHtml(m.id_material||'')}</td>
      <td>${escapeHtml(m.armazem||'')}</td>
      <td>${escapeHtml(m.material||'')}</td>
      <td>${escapeHtml(m.referencia||'')}</td>
      <td>${escapeHtml(m.unidade||'')}</td>
      <td>${escapeHtml(m.stock_minimo||'')}</td>
      <td>${escapeHtml(m.controla_validade||'')}</td>
    </tr>`).join('');

  qs('view-gestao').innerHTML = `
    <div class="card">
      <div class="topbar"><h3>Materiais</h3><button class="secondary" onclick="initApp()">Atualizar</button></div>
      <div class="small muted">Esta versão mostra os materiais da aba Materiais. Se quiseres, a seguir adiciono criar/editar/apagar direto na app.</div>
    </div>
    <div class="card table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Armazém</th><th>Material</th><th>Referência</th><th>Unidade</th><th>Stock mín.</th><th>Validade</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="7">Sem materiais.</td></tr>'}</tbody>
      </table>
    </div>`;
}

async function renderArmazem(nome){
  const mats = state.materiais.filter(m => String(m.armazem).trim() === nome);
  const rows = mats.map((m,i)=>`
    <tr>
      <td>${escapeHtml(m.id_material||'')}</td>
      <td>${escapeHtml(m.material||'')}</td>
      <td>${escapeHtml(m.referencia||'')}</td>
      <td>${escapeHtml(m.stock_minimo||0)}</td>
      <td><input type="number" min="0" id="stock_${i}" placeholder="0"></td>
      <td><input type="text" id="lote_${i}" placeholder="Lote"></td>
      <td><input type="date" id="validade_${i}"></td>
      <td><input type="text" id="obs_${i}" placeholder="Observações"></td>
    </tr>`).join('');

  qs('view-armazem').innerHTML = `
    <div class="card">
      <div class="topbar">
        <div>
          <h3 style="margin:0">${escapeHtml(nome)}</h3>
          <div class="small muted">Inventário semanal do armazém</div>
        </div>
        <div class="controls">
          <input id="responsavel" placeholder="Responsável">
          <button class="primary" onclick="guardarInventario('${encodeURIComponent(nome)}')">Guardar inventário</button>
        </div>
      </div>
    </div>
    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Material</th><th>Referência</th><th>Stock mín.</th><th>Stock atual</th><th>Lote</th><th>Validade</th><th>Obs.</th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="8">Sem materiais neste armazém. Adiciona na aba Materiais da Sheet.</td></tr>'}</tbody>
      </table>
    </div>`;
}

async function guardarInventario(nomeEnc){
  const nome = decodeURIComponent(nomeEnc);
  const mats = state.materiais.filter(m => String(m.armazem).trim() === nome);
  const responsavel = qs('responsavel').value.trim();
  if(!responsavel) return alert('Indica o responsável.');

  const itens = mats.map((m,i)=>({
    id_material: m.id_material || '',
    material: m.material || '',
    referencia: m.referencia || '',
    lote: qs(`lote_${i}`).value.trim(),
    validade: qs(`validade_${i}`).value,
    stock_atual: Number(qs(`stock_${i}`).value || 0),
    stock_minimo: Number(m.stock_minimo || 0),
    observacoes: qs(`obs_${i}`).value.trim()
  })).filter(item => item.material);

  try {
    await apiPost({ action:'guardarInventario', armazem:nome, responsavel, itens });
    alert('Inventário guardado com sucesso.');
    await initApp();
    openTab(encodeURIComponent(nome));
  } catch(e) {
    alert('Erro ao guardar. Confirma permissões do Apps Script e se o deploy está atualizado.');
  }
}

loadApiUrl();
renderTabs('Resumo');
qs('view-resumo').innerHTML = '<div class="card">Clica em <b>Ligar</b> para carregar os dados.</div>';
</script>
</body>
</html>
